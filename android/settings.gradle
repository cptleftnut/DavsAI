pluginManagement {
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

// Denne kode finder automatisk stien til React Native pluginnet
def findReactNativePlugin() {
    def nodeModules = new File(rootDir, "../node_modules")
    def pluginPath = new File(nodeModules, "@react-native/gradle-plugin")
    if (pluginPath.exists()) return pluginPath
    return new File(nodeModules, "react-native/gradle-plugin")
}

includeBuild(findReactNativePlugin())

plugins {
    id("com.facebook.react.settings")
}

extensions.configure(com.facebook.react.ReactSettingsExtension) {
    autolinkLibrariesWithApp()
}

rootProject.name = 'DAVSlm'
include ':app'
