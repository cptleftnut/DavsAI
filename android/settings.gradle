// 1. Dette SKAL være øverst
pluginManagement { 
    includeBuild("../node_modules/@react-native/gradle-plugin") 
}

// 2. Dette SKAL være det næste
plugins { 
    id("com.facebook.react.settings") 
}

// 3. Konfiguration af autolinking
extensions.configure(com.facebook.react.ReactSettingsExtension) { ex -> 
    ex.autolinkLibrariesWithApp() 
}

// 4. Først NU må du have navne og inclusions
rootProject.name = 'DAVSlm'

include ':app'
includeBuild('../node_modules/@react-native/gradle-plugin')
