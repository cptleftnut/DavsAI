name: Byg DAVSlm Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Hent kildekode
        uses: actions/checkout@v4

      - name: Opsæt Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm' # Gør fremtidige builds hurtigere

      - name: Opsæt Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"
          cache: 'gradle'

      - name: Installer afhængigheder
        run: npm install --include=dev # Sikrer at alt bliver installeret

      - name: Gør gradlew eksekverbar
        run: chmod +x android/gradlew

      - name: SUT MIN FUCKING DUT OG KOM VIDERE FORHELVEDE!
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Gem APK filen som en artefakt
        uses: actions/upload-artifact@v4
        with:
          name: DAVSlm
          path: android/app/build/outputs/apk/release/app-release.apk
