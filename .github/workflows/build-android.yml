name: Byg DAVSlm Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Hent kildekode
        uses: actions/checkout@v4

      - name: Opsæt Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          # Cache er fjernet herfra for at undgå 'lock file not found' fejlen

      - name: Opsæt Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Installer afhængigheder
        run: npm install

      - name: Gør gradlew eksekverbar
        run: chmod +x android/gradlew

      - name: FUCK DIG DAV! HAH PRØV IGEN!
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Gem APK filen som en artefakt
        uses: actions/upload-artifact@v4
        with:
          name: DAVSlm
          path: android/app/build/outputs/apk/release/app-release.apk
