name: Byg DAVSlm Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Hent kildekode
        uses: actions/checkout@v3

      - name: Opsæt Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Opsæt Java JDK
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Installer afhængigheder
        run: npm install

      - name: Byg Android Release APK
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Gem APK filen som en artefakt
        uses: actions/upload-artifact@v3
        with:
          name: DAVSlm
          path: android/app/build/outputs/apk/release/app-release.apk
