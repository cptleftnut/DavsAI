services:
  # Backend API (Flask)
  - type: web
    name: davsai-backend
    runtime: python
    plan: free
    region: frankfurt
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false # Brugeren skal selv indsætte nøglen i Render Dashboard
      - key: PYTHON_VERSION
        value: 3.11.0

# Frontend (Static Site)
  - type: web
    name: davsai-frontend
    env: static # NB: Render bruger 'env: static', ikke 'runtime'
    plan: free
    region: frankfurt
    buildCommand: cp package-web.json package.json && npm install && npm run build
    
    # HER ER RETTELSEN:
    staticPublishPath: web-server # Ret 'build' til 'dist' eller 'web-build', hvis din app gemmer det der
    
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html # Sørger for at React/routing virker
