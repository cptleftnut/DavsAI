services:
  # Backend API (Flask)
  - type: web
    name: davsai-backend
    runtime: python
    plan: free
    region: frankfurt
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false # Brugeren skal selv indsætte nøglen i Render Dashboard
      - key: PYTHON_VERSION
        value: 3.11.0

  # Frontend (Static Site)
  - type: web
    name: davsai-frontend
    runtime: static
    plan: free
    region: frankfurt
    buildCommand: cp package-web.json package.json && npm install && npm run build
    publishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: web/index.html
